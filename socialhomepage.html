<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Join Social Networks</title>
    <!-- Используем Google Fonts для стилизации текста (опционально) -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Arial&display=swap">
    <!-- Встроенные стили -->
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 50px;
            background-color: #f0f0f0;
        }

        h1 {
            margin-bottom: 40px;
            font-size: 24px;
            color: #333;
        }

        .buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .social-button {
            display: flex;
            align-items: center;
            padding: 10px 20px;
            background-color: #fff;
            border: 2px solid #ccc;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            transition: background-color 0.3s, border-color 0.3s;
        }

        .social-button:hover {
            background-color: #e0e0e0;
            border-color: #999;
        }

        .icon {
            width: 24px;
            height: 24px;
            margin-right: 10px;
        }
    </style>
</head>
<body>

    <h1>Join other social networks</h1>

    <div class="buttons">
        <!-- Телеграм -->
        <a class="social-button" href="https://t.me/your_telegram" target="_blank" rel="noopener noreferrer">
            <img src="https://upload.wikimedia.org/wikipedia/commons/8/82/Telegram_logo.svg" alt="Telegram" class="icon">
            Telegram
        </a>

        <!-- ВКонтакте -->
        <a class="social-button" href="https://vk.com/your_vk" target="_blank" rel="noopener noreferrer">
            <img src="https://upload.wikimedia.org/wikipedia/commons/5/51/Vk_logo.png" alt="VK" class="icon">
            VK
        </a>

        <!-- Максим -->
        <a class="social-button" href="https://max.com/your_max" target="_blank" rel="noopener noreferrer">
            <img src="https://upload.wikimedia.org/wikipedia/commons/0/0f/Max_logo.png" alt="Max" class="icon">
            Max
        </a>
    </div>

</body>
</html>
